<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>音訊視覺化圓圈</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            margin-top: 20px;
            border-radius: 50%;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #00ce8d;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="playBtn">播放音樂</button>
    <canvas id="visualizer" width="400" height="400"></canvas>

    <script>
        const playBtn = document.getElementById('playBtn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        let audioCtx;
        let analyser;
        let source;
        let audio = new Audio('music.mp3'); // 確保檔案路徑正確
        let isSetup = false;

        // 初始化 Audio Context
        function setupAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            // 設定 FFT 大小，這會影響取樣精度
            analyser.fftSize = 256;
            isSetup = true;
        }

        playBtn.addEventListener('click', () => {
            if (!isSetup) setupAudio();

            if (audio.paused) {
                audio.play();
                playBtn.innerText = "暫停";
                draw();
            } else {
                audio.pause();
                playBtn.innerText = "播放";
            }
        });

        function draw() {
            if (audio.paused) return;

            requestAnimationFrame(draw);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // 計算平均音量 (正規化到 0 ~ 1 之間)
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            const average = sum / bufferLength / 255; 

            // 清除畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 判斷音量是否超過 0.3
            let radius;
            if (average > 0.3) {
                radius = 100 + (average * 150); // 放大
                ctx.fillStyle = '#00ce8d';
            } else {
                radius = 60; // 縮小到基礎值
                ctx.fillStyle = '#555';
            }

            // 繪製圓圈
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
            ctx.fill();
        }
    </script>
</body>
</html>
